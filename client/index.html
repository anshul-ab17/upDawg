<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Updawg Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
color:#22c55e;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

input{
padding:8px;
width:300px;
margin-right:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:left;
}

.status-up{
color:#22c55e;
font-weight:bold;
}

.status-down{
color:#ef4444;
font-weight:bold;
}

#log{
background:black;
padding:10px;
height:200px;
overflow:auto;
font-size:12px;
}

</style>

</head>

<body>

<h1>Updawg Monitoring</h1>

<div class="card">

<h2>Add Website</h2>

<input id="urlInput" placeholder="https://example.com">

<button onclick="addWebsite()">Add Website</button>

</div>



<div class="card">

<h2>Websites</h2>

<button onclick="loadWebsites()">Refresh</button>

<table id="sitesTable">

<tr>
<th>ID</th>
<th>URL</th>
<th>Status</th>
<th>Latency</th>
</tr>

</table>

</div>



<div class="card">

<h2>Worker Controls</h2>

<button onclick="triggerMonitor()">Trigger Monitor</button>

<button onclick="connectWS()">Connect Live Updates</button>

</div>



<div class="card">

<h2>Latency Chart</h2>

<canvas id="latencyChart"></canvas>

</div>



<div class="card">

<h2>System Logs</h2>

<div id="log"></div>

</div>


<script>

const API="http://localhost:3001"

let socket=null

let latencyData=[]
let labels=[]

const ctx=document.getElementById("latencyChart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Latency (ms)",
data:latencyData,
borderColor:"#22c55e"
}]
},
options:{
responsive:true
}
})


function log(msg){

const el=document.getElementById("log")

const time=new Date().toLocaleTimeString()

el.innerHTML+=`[${time}] ${msg}<br>`

el.scrollTop=el.scrollHeight

}



async function addWebsite(){

const url=document.getElementById("urlInput").value

try{

const res=await fetch(API+"/websites",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({url})

})

const data=await res.json()

log("Website added → "+JSON.stringify(data))

loadWebsites()

}catch(e){

log("Error adding website")

}

}



async function loadWebsites(){

try{

const res=await fetch(API+"/websites")

const sites=await res.json()

const table=document.getElementById("sitesTable")

table.innerHTML=`

<tr>
<th>ID</th>
<th>URL</th>
<th>Status</th>
<th>Latency</th>
</tr>
`

sites.forEach(site=>{

const row=document.createElement("tr")

const statusClass=site.status==="UP"?"status-up":"status-down"

row.innerHTML=`

<td>${site.id}</td>
<td>${site.url}</td>
<td class="${statusClass}">${site.status || "unknown"}</td>
<td>${site.latency || "-"}</td>

`

table.appendChild(row)

})

}catch(e){

log("Error loading websites")

}

}



async function triggerMonitor(){

try{

await fetch(API+"/monitor/trigger",{method:"POST"})

log("Monitoring triggered")

}catch(e){

log("Failed to trigger monitor")

}

}



function connectWS(){

if(socket){

log("Already connected")

return

}

socket=new WebSocket("ws://localhost:3001/ws")

socket.onopen=()=>{

log("WebSocket connected")

}

socket.onmessage=(event)=>{

const data=JSON.parse(event.data)

log("Live update → "+JSON.stringify(data))

if(data.latency){

latencyData.push(data.latency)

labels.push(new Date().toLocaleTimeString())

if(latencyData.length>20){

latencyData.shift()

labels.shift()

}

chart.update()

}

}

socket.onclose=()=>{

log("WebSocket disconnected")

socket=null

}

}

</script>

</body>
</html>
